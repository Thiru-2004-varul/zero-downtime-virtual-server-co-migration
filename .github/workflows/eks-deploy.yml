name: EKS Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 697551514015.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: mobile-app
  CLUSTER_NAME: vmcm-eks

permissions:
  id-token: write
  contents: read

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_v1: ${{ steps.changes.outputs.app_v1 }}
      app_v2: ${{ steps.changes.outputs.app_v2 }}
      k8s:    ${{ steps.changes.outputs.k8s }}
      tf:     ${{ steps.changes.outputs.tf }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            app_v1:
              - 'app/v1/**'
            app_v2:
              - 'app/v2/**'
            k8s:
              - 'k8s/**'
            tf:
              - 'terraform/**'

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test v1
        run: |
          pip install flask prometheus-client
          cd app/v1
          python app.py &
          sleep 3
          curl -sf http://localhost:5000/health
          kill %1

      - name: Test v2
        run: |
          cd app/v2
          python app.py &
          sleep 3
          curl -sf http://localhost:5000/health
          kill %1

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build v2 for scanning
        run: docker build -t mobile-app:scan app/v2/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "mobile-app:scan"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

  build-push-ecr:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697551514015:role/vmcm-eks-github-actions-role
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push v1
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:v1 app/v1/
          docker push $ECR_REGISTRY/$ECR_REPO:v1

      - name: Build and push v2
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:v2 app/v2/
          docker push $ECR_REGISTRY/$ECR_REPO:v2
          docker tag $ECR_REGISTRY/$ECR_REPO:v2 $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - name: Also mirror to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag $ECR_REGISTRY/$ECR_REPO:v1 thiru2004/mobile-app:v1
          docker tag $ECR_REGISTRY/$ECR_REPO:v2 thiru2004/mobile-app:v2
          docker push thiru2004/mobile-app:v1
          docker push thiru2004/mobile-app:v2

  terraform-plan:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tf == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697551514015:role/vmcm-eks-github-actions-role
          role-session-name: TerraformPlan-${{ github.run_id }}
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
            -var="cluster_name=vmcm-eks" \
            -out=tfplan
          echo "Plan complete — review above before applying manually"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 7

  validate-k8s:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.k8s == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Validate all manifests
        run: |
          kubectl apply --dry-run=client -f k8s/serviceaccount.yml
          kubectl apply --dry-run=client -f k8s/eks-deployment.yml
          kubectl apply --dry-run=client -f k8s/eks-service.yml
          kubectl apply --dry-run=client -f k8s/rolling-deployment.yml
          kubectl apply --dry-run=client -f k8s/recreate-deployment.yml
          kubectl apply --dry-run=client -f k8s/service.yml
          kubectl apply --dry-run=client -f k8s/recreate-service.yml
          echo "All manifests valid"

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-push-ecr, terraform-plan, validate-k8s]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "  EKS PIPELINE — Run #${{ github.run_number }}"
          echo "========================================"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Test     : ${{ needs.test.result }}"
          echo "  Scan     : ${{ needs.security-scan.result }}"
          echo "  ECR Push : ${{ needs.build-push-ecr.result }}"
          echo "  TF Plan  : ${{ needs.terraform-plan.result }}"
          echo "  K8s Val  : ${{ needs.validate-k8s.result }}"
          echo "========================================"
          echo "  terraform apply — run manually"
          echo "  kubectl apply   — run manually"
          echo "========================================"