name: EKS Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 697551514015.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO: mobile-app
  CLUSTER_NAME: vmcm-eks

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_v1: ${{ steps.changes.outputs.app_v1 }}
      app_v2: ${{ steps.changes.outputs.app_v2 }}
      k8s: ${{ steps.changes.outputs.k8s }}
      tf: ${{ steps.changes.outputs.tf }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app_v1:
              - 'app/v1/**'
            app_v2:
              - 'app/v2/**'
            k8s:
              - 'k8s/**'
            tf:
              - 'terraform/**'

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test v1
        run: |
          pip install flask prometheus-client
          cd app/v1
          python app.py &
          sleep 3
          curl -sf http://localhost:5000/health
          kill %1
          echo "v1 passed"
      - name: Test v2
        run: |
          cd app/v2
          python app.py &
          sleep 3
          curl -sf http://localhost:5000/health
          kill %1
          echo "v2 passed"

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build v2 for scanning
        run: docker build -t mobile-app:scan app/v2/
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "mobile-app:scan"
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

  validate-k8s:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"
      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f k8s/serviceaccount.yml
          kubectl apply --dry-run=client --validate=false -f k8s/eks-deployment.yml
          kubectl apply --dry-run=client --validate=false -f k8s/monitoring.yml
          echo "All manifests valid"

  terraform-plan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697551514015:role/vmcm-eks-github-actions-role
          role-session-name: TerraformPlan-${{ github.run_id }}
          aws-region: ap-south-1
        continue-on-error: true
        id: oidc-auth
      - name: Fallback to AWS keys if OIDC not ready
        if: steps.oidc-auth.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
            -var="cluster_name=vmcm-eks" \
            -out=tfplan
          echo "Plan complete — review above, apply manually"
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 7

  build-push-ecr:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      v1_tag: ${{ steps.set-tags.outputs.v1_tag }}
      v2_tag: ${{ steps.set-tags.outputs.v2_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        id: set-tags
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "v1_tag=v1-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "v2_tag=v2-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Short SHA: ${SHORT_SHA}"
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::697551514015:role/vmcm-eks-github-actions-role
          role-session-name: ECRPush-${{ github.run_id }}
          aws-region: ap-south-1
        continue-on-error: true
        id: oidc-ecr
      - name: Fallback to AWS keys if OIDC not ready
        if: steps.oidc-ecr.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        continue-on-error: true
      - name: Build and push v1 to ECR
        if: steps.ecr-login.outcome == 'success'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/$ECR_REPO:v1 \
                       -t $ECR_REGISTRY/$ECR_REPO:v1-${SHORT_SHA} \
                       app/v1/
          docker push $ECR_REGISTRY/$ECR_REPO:v1
          docker push $ECR_REGISTRY/$ECR_REPO:v1-${SHORT_SHA}
          echo "v1 pushed: v1 and v1-${SHORT_SHA}"
      - name: Build and push v2 to ECR
        if: steps.ecr-login.outcome == 'success'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/$ECR_REPO:v2 \
                       -t $ECR_REGISTRY/$ECR_REPO:v2-${SHORT_SHA} \
                       -t $ECR_REGISTRY/$ECR_REPO:latest \
                       app/v2/
          docker push $ECR_REGISTRY/$ECR_REPO:v2
          docker push $ECR_REGISTRY/$ECR_REPO:v2-${SHORT_SHA}
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "v2 pushed: v2, v2-${SHORT_SHA}, latest"
      - name: Mirror to Docker Hub
        if: steps.ecr-login.outcome == 'success'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag $ECR_REGISTRY/$ECR_REPO:v1 thiru2004/mobile-app:v1
          docker tag $ECR_REGISTRY/$ECR_REPO:v2 thiru2004/mobile-app:v2
          docker push thiru2004/mobile-app:v1
          docker push thiru2004/mobile-app:v2
      - name: Print deploy command
        if: steps.ecr-login.outcome == 'success'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "========================================"
          echo "  kubectl set image deployment/mobile-app \\"
          echo "    mobile-app=$ECR_REGISTRY/$ECR_REPO:v2-${SHORT_SHA}"
          echo "========================================"

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan, validate-k8s, terraform-plan, build-push-ecr]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "  EKS PIPELINE — Run #${{ github.run_number }}"
          echo "========================================"
          echo "  Branch     : ${{ github.ref_name }}"
          echo "  Commit     : ${{ github.sha }}"
          echo "  Test       : ${{ needs.test.result }}"
          echo "  Scan       : ${{ needs.security-scan.result }}"
          echo "  K8s Valid  : ${{ needs.validate-k8s.result }}"
          echo "  TF Plan    : ${{ needs.terraform-plan.result }}"
          echo "  ECR Push   : ${{ needs.build-push-ecr.result }}"
          echo "========================================"
          echo "  terraform apply  → run manually"
          echo "  kubectl apply    → run manually"
          echo "========================================"
