name: Virtual Server Co-Migration CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/v1/**'
      - 'app/v2/**'
      - 'k8s/**'
      - 'terraform/**'
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: mobile-app

jobs:
  detect-changes:
    name: Detect Changed Versions
    runs-on: ubuntu-latest
    outputs:
      v1_changed: ${{ steps.filter.outputs.v1 }}
      v2_changed: ${{ steps.filter.outputs.v2 }}
      k8s_changed: ${{ steps.filter.outputs.k8s }}
      tf_changed: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            v1:
              - 'app/v1/**'
            v2:
              - 'app/v2/**'
            k8s:
              - 'k8s/**'
            terraform:
              - 'terraform/**'

  test-v1:
    name: Test v1 Application
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.v1_changed == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r app/v1/requirements.txt
      - run: |
          cd app/v1
          python app.py &
          sleep 3
          curl -f http://localhost:5000/health
          echo "v1 health check passed"
          kill %1

  test-v2:
    name: Test v2 Application
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.v2_changed == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r app/v2/requirements.txt
      - run: |
          cd app/v2
          python app.py &
          sleep 3
          curl -f http://localhost:5000/health
          echo "v2 health check passed"
          kill %1

  build-v1:
    name: Build and Push v1 Image
    runs-on: ubuntu-latest
    needs: test-v1
    if: |
      always() &&
      needs.test-v1.result == 'success' &&
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Get version from app.py
        id: get_version
        run: |
          VERSION=$(grep '^VERSION' app/v1/app.py | head -1 | cut -d'"' -f2)
          echo "Detected version: $VERSION"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v4
        with:
          context: ./app/v1
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-v2:
    name: Build and Push v2 Image
    runs-on: ubuntu-latest
    needs: test-v2
    if: |
      always() &&
      needs.test-v2.result == 'success' &&
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Get version from app.py
        id: get_version
        run: |
          VERSION=$(grep '^VERSION' app/v2/app.py | head -1 | cut -d'"' -f2)
          echo "Detected version: $VERSION"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v4
        with:
          context: ./app/v2
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v2
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v2-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-v2
    if: always() && needs.build-v2.result == 'success'
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/mobile-app:v2
          format: table
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.k8s_changed == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'
      - run: |
          kubectl apply --dry-run=client -f k8s/rolling-deployment.yml
          kubectl apply --dry-run=client -f k8s/recreate-deployment.yml
          kubectl apply --dry-run=client -f k8s/service.yml
          kubectl apply --dry-run=client -f k8s/recreate-service.yml
          echo "All K8s manifests valid"
      - uses: actions/upload-artifact@v4
        with:
          name: k8s-manifests
          path: k8s/

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tf_changed == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - name: Terraform Init
        run: terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform Plan
        run: terraform plan -var="key_name=vmcm-key"
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-v1, test-v2, build-v1, build-v2, security, validate-k8s, terraform-plan]
    if: always()
    steps:
      - run: |
          echo "============================================"
          echo "   Virtual Server Co-Migration Pipeline    "
          echo "============================================"
          echo "  test-v1:        ${{ needs.test-v1.result }}"
          echo "  test-v2:        ${{ needs.test-v2.result }}"
          echo "  build-v1:       ${{ needs.build-v1.result }}"
          echo "  build-v2:       ${{ needs.build-v2.result }}"
          echo "  security:       ${{ needs.security.result }}"
          echo "  validate-k8s:   ${{ needs.validate-k8s.result }}"
          echo "  terraform-plan: ${{ needs.terraform-plan.result }}"
          echo "============================================"
