apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-app
  namespace: default
  labels:
    app: mobile-app
    env: production
spec:
  replicas: 2

  selector:
    matchLabels:
      app: mobile-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: mobile-app

    spec:
      serviceAccountName: mobile-app-sa

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: mobile-app

      containers:
        - name: mobile-app
          image: 697551514015.dkr.ecr.ap-south-1.amazonaws.com/mobile-app:v1

          ports:
            - containerPort: 5000
              name: http

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

          env:
            - name: APP_VERSION
              value: "v1"
            - name: AWS_REGION
              value: "ap-south-1"

      terminationGracePeriodSeconds: 30
      